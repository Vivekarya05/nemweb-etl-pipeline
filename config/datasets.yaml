datasets:
  - name: dispatch_price
    display_name: Dispatch Price
    description: Regional dispatch interval price outcomes and energy price fields.
    enabled: true
    directory_urls:
      - https://www.nemweb.com.au/REPORTS/CURRENT/DispatchIS_Reports/
      - https://www.nemweb.com.au/REPORTS/ARCHIVE/DispatchIS_Reports/
    file_name_pattern: PUBLIC_DISPATCHIS
    table_name_pattern: DISPATCHPRICE
    datetime_column: settlementdate
    primary_keys:
      - settlementdate
      - regionid
    standard_columns:
      - settlementdate
      - regionid
      - intervention
      - rrp
      - eep
      - rop
      - raise6secrrp
      - raise60secrrp
      - raise5minrrp
      - raiseregrrp
      - lower6secrrp
      - lower60secrrp
      - lower5minrrp
      - lowerregrrp
      - raise1secrrp
      - lower1secrrp
      - lastchanged
    target_schema: raw
    target_table: dispatch_price

  - name: dispatch_regionsum
    display_name: Dispatch Region Summary
    description: Five-minute regional demand, generation, interchange, and dispatch summary.
    enabled: true
    directory_urls:
      - https://www.nemweb.com.au/REPORTS/CURRENT/DispatchIS_Reports/
      - https://www.nemweb.com.au/REPORTS/ARCHIVE/DispatchIS_Reports/
    file_name_pattern: PUBLIC_DISPATCHIS
    table_name_pattern: DISPATCHREGIONSUM
    datetime_column: settlementdate
    primary_keys:
      - settlementdate
      - regionid
    standard_columns:
      - settlementdate
      - regionid
      - intervention
      - totaldemand
      - availablegeneration
      - availableload
      - demandforecast
      - dispatchablegeneration
      - dispatchableload
      - netinterchange
      - excessgeneration
      - totalintermittentgeneration
      - demand_and_nonschedgen
      - uigf
      - lastchanged
    target_schema: raw
    target_table: dispatch_regionsum

